<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#1a1a2e">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="計算機">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <link rel="manifest" href="manifest.json">
  <title>計算機</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app-container">
    <div class="calculator">
      <div class="display">
        <div class="display-top">
          <div class="expression" id="expression"></div>
          <button class="history-toggle" id="historyToggle" title="履歴">&#x1f553;</button>
        </div>
        <div class="result" id="result">0</div>
      </div>
      <div class="buttons">
        <button class="btn clear" data-action="clear">C</button>
        <button class="btn operator" data-action="sign">±</button>
        <button class="btn operator" data-action="percent">%</button>
        <button class="btn operator" data-action="operator" data-value="÷">÷</button>

        <button class="btn number" data-action="number" data-value="7">7</button>
        <button class="btn number" data-action="number" data-value="8">8</button>
        <button class="btn number" data-action="number" data-value="9">9</button>
        <button class="btn operator" data-action="operator" data-value="×">×</button>

        <button class="btn number" data-action="number" data-value="4">4</button>
        <button class="btn number" data-action="number" data-value="5">5</button>
        <button class="btn number" data-action="number" data-value="6">6</button>
        <button class="btn operator" data-action="operator" data-value="−">−</button>

        <button class="btn number" data-action="number" data-value="1">1</button>
        <button class="btn number" data-action="number" data-value="2">2</button>
        <button class="btn number" data-action="number" data-value="3">3</button>
        <button class="btn operator" data-action="operator" data-value="+">+</button>

        <button class="btn number zero" data-action="number" data-value="0">0</button>
        <button class="btn number" data-action="decimal">.</button>
        <button class="btn equals" data-action="equals">=</button>
      </div>
      <div class="currency-bar">
        <button class="currency-btn" id="toEur">&#xa5; → &#x20ac;</button>
        <button class="currency-btn" id="toJpy">&#x20ac; → &#xa5;</button>
        <div class="currency-rate" id="currencyRate">レート取得中...</div>
      </div>
    </div>

    <div class="history-panel" id="historyPanel">
      <div class="history-tabs">
        <button class="history-tab active" id="tabHistory" data-tab="history">履歴</button>
        <button class="history-tab" id="tabSaved" data-tab="saved">保存済み</button>
      </div>
      <div class="history-tab-content" id="tabContentHistory">
        <div class="history-header">
          <button class="history-save-btn" id="historySave">&#x1f4be; 保存</button>
          <button class="history-clear" id="historyClear">クリア</button>
        </div>
        <div class="history-list" id="historyList">
          <div class="history-empty">履歴はありません</div>
        </div>
      </div>
      <div class="history-tab-content hidden" id="tabContentSaved">
        <div class="github-sync-bar">
          <button class="github-sync-btn" id="githubSyncBtn">&#x2601; 同期</button>
          <button class="github-settings-btn" id="githubSettingsBtn">&#x2699;</button>
          <span class="github-status" id="githubStatus"></span>
        </div>
        <div class="saved-list" id="savedList">
          <div class="history-empty">保存データはありません</div>
        </div>
      </div>
    </div>

    <!-- 保存モーダル -->
    <div class="save-modal-overlay hidden" id="saveModal">
      <div class="save-modal">
        <h3>履歴を保存</h3>
        <p class="save-modal-info" id="saveModalInfo"></p>
        <input type="text" class="save-modal-input" id="saveNote" placeholder="メモを入力（例：買い物の計算）" maxlength="50">
        <div class="save-modal-actions">
          <button class="save-modal-btn cancel" id="saveCancelBtn">キャンセル</button>
          <button class="save-modal-btn confirm" id="saveConfirmBtn">保存する</button>
        </div>
        <div class="save-modal-notice" id="saveModalNotice">&#x2601; GitHub Gist に保存されます</div>
      </div>
    </div>

    <!-- GitHub設定モーダル -->
    <div class="save-modal-overlay hidden" id="githubModal">
      <div class="save-modal">
        <h3>&#x2601; GitHub Gist 連携</h3>
        <p class="save-modal-info">保存データをGitHub Gistに同期します。<br>トークンは端末内にのみ保存されます。</p>
        <label class="github-label">Personal Access Token</label>
        <input type="password" class="save-modal-input" id="githubTokenInput" placeholder="ghp_xxxxxxxxxxxx" autocomplete="off">
        <p class="github-help">
          <a href="https://github.com/settings/tokens/new?scopes=gist&amp;description=Calculator%20App" target="_blank" rel="noopener">
            &#x1f517; トークンを作成（gist権限のみ）
          </a>
        </p>
        <div class="github-current-status" id="githubCurrentStatus"></div>
        <div class="save-modal-actions">
          <button class="save-modal-btn cancel" id="githubCancelBtn">閉じる</button>
          <button class="save-modal-btn confirm" id="githubSaveTokenBtn">設定する</button>
        </div>
      </div>
    </div>
  </div>
  <script src="script.js"></script>
</body>
</html>
